name: 自动化拉取 MetaCubeX 规则
on:
  schedule:
    - cron: '0 1 * * *'    # UTC 1:00 = 北京时间 9:00
  workflow_dispatch:        # 允许手动触发

permissions:
  contents: write

jobs:
  rule_sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v4
        with:
          path: rule_sync_temp
          fetch-depth: 0  # 获取完整历史记录，便于差异比较

      - name: 检出 MetaCubeX/meta-rules-dat
        uses: actions/checkout@v4
        with:
          repository: MetaCubeX/meta-rules-dat
          ref: meta
          path: meta-rules-dat
      
      - name: 创建目标目录
        run: |
          mkdir -p rule_sync_temp/ruleProviders/Stash
          
      - name: 拉取&处理DOMAIN规则文件
        run: |
          # 添加时间戳到文件名，便于追踪更新历史
          TIMESTAMP=$(date +"%Y%m%d-%H%M%S")
          BEIJIN_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')
          
          # 使用rsync替代cp，确保目录结构和文件属性一致
          rsync -av \
            --exclude='*'' \
            --include='geolocation-!cn.yaml' \
            --include='cn.yaml' \
            --include='google.yaml' \
            meta-rules-dat/geo/geosite/ rule_sync_temp/ruleProviders/Stash/
          
          # 重命名文件并添加时间戳
          # mv rule_sync_temp/ruleProviders/Stash/cn.yaml \
          #    rule_sync_temp/ruleProviders/Stash/cn_domain.yaml

      - name: 提交变更
        id: commit-changes
        run: |
          cd rule_sync_temp
          
          # 设置Git身份
          git config user.name "GitHub Actions"
          git config user.email "actions@users.noreply.github.com"
          
          # 仅当有变更时提交
          git add ruleProviders/Stash
          
          if git diff-index --quiet HEAD --; then
            echo "🟢 无变更可提交"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "➕ 检测到变更，准备提交"
            git commit -m "自动更新规则 ($(date +'%Y-%m-%d %H:%M:%S'))"
            
            # 重试机制：先拉取最新变更再推送
            for i in {1..3}; do
              if git pull --rebase origin main && git push origin main; then
                echo "✅ 变更已成功提交"
                echo "has_changes=true" >> $GITHUB_OUTPUT
                break
              else
                echo "⚠️ 推送失败，重试中 ($i/3)..."
                sleep 2
              fi
            done
            
            if [ $? -ne 0 ]; then
              echo "❌ 错误：提交失败"
              exit 1
            fi
          fi





