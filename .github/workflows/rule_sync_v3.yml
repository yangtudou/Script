# version: v3_beta
# updated at: 2026-05-30
# 直接从 geo 源中提取
#
#
# UTC 22:00 (北京时间早 6:00 自动拉取) 
#
# 支持 surge mihomo
#

name: 自动化规则下载 v3_beta

on:
  # schedule:
  #   - cron: '0 22 * * *'
  workflow_dispatch:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - ".github/custom_direct.txt"
  #     - ".github/custom_proxy.txt"

permissions:
  contents: write
  actions: write

env:
  TZ: Asia/shanghai

jobs:
  rule_sync:
    runs-on: ubuntu-latest
    steps:
   
      - name: "当前仓库 rules 分支"
        uses: actions/checkout@v6
        with:
          path: rule_sync_temp
          ref: rules
          fetch-depth: 1

      - name: "下载 geox 转换器"
        run: |
          curl -L -o geox https://github.com/yangtudou/Script/raw/refs/heads/main/.github/geox-linux-amd64
          chmod +x geox

      - name: "下载 geosite.dat"
        run: |
          curl -L -o geosite.dat https://github.com/v2fly/domain-list-community/releases/latest/download/dlc.dat

      - name: "下载 geoip.dat"
        run: |
          curl -L -o geoip.dat https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat

      - name: 清理旧规则
        run: |
          rm -rf rule_sync_temp/clash
          rm -rf rule_sync_temp/surge

#       - name: 生成 Mihomo 规则
#         run: |
#           ./geox geosite -f geosite.dat -t clash -o rule_sync_temp \
#             -s google,category-ntp,apple,category-porn,cn,geolocation-!cn,github,meta,category-ai-chat-!cn,github,telegram

      - name: 生成 Surge 规则
        run: |
          ./geox geosite -f geosite.dat -t surge -o rule_sync_temp

          ./geox geoip -f geoip.dat -t surge -s private,cn,google,telegram

          for f in rule_sync_temp/surge/*.txt; do
              [ -f "$f" ] || continue
              name=$(basename "$f")

              if [ -f "geoip/surge/$name" ]; then
                  sort -u "$f" "geoip/surge/$name" -o "$f"
              fi
          done
      
      - name: 提交变更
        working-directory: rule_sync_temp
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout --orphan temp
          git branch -D rules
          git checkout --orphan rules
          
          git add .
          git commit -m "CI: Last Update at $(date +"%Y-%m-%d %H:%M") + no-resolve for IP rules"
          git push -f origin rules

  clean_workflow:
    runs-on: ubuntu-latest
    needs: rule_sync
    steps:
      - name: clean_workflow
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 0
          repository: ${{ github.repository }}
