# version: v3_beta
# updated at: 2026-06-03
#
#
# UTC 22:00 (北京时间早 6:00 自动拉取) 
#
# 支持:
#   - surge
#   - mihomo
#

name: 自动化规则下载 v3_beta

on:
  # schedule:
  #   - cron: '0 22 * * *'
  workflow_dispatch:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - ".github/custom_direct.txt"
  #     - ".github/custom_proxy.txt"

permissions:
  contents: write
  actions: write

env:
  TZ: Asia/shanghai

jobs:
  rule_sync:
    runs-on: ubuntu-latest

    # 需要转换的分类
    env:
      # 数据源: v2fly/domain-list-community
      GEOSITE_DAT_URL: "https://github.com/v2fly/domain-list-community/releases/latest/download/dlc.dat"
      # 数据源: MetaCubeX/meta-rules-dat
      GEOIP_DAT_URL: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
      GEOSITE_LIST: "private,category-ntp,microsoft,apple,github,x,meta,google-gemini,google,openai,telegram,cn,geolocation-!cn"
      GEOIP_LIST: "private,google,telegram,cn"
    
    steps:
      - name: "当前仓库 rules 分支"
        uses: actions/checkout@v6
        with:
          path: rules
          ref: rules
          fetch-depth: 1

      - name: "下载 geox 转换器"
        run: |
          curl -L -o geox https://github.com/yangtudou/Script/raw/refs/heads/main/.github/geox-linux-amd64
          chmod +x geox
      
      - name: "下载 geosite.dat"
        run: |
          curl -L -o geosite.dat "$GEOSITE_DAT_URL"

      - name: "下载 geoip.dat"
        run: |
          curl -L -o geoip.dat "$GEOIP_DAT_URL"

      - name: 清理旧规则
        run: |
          rm -rf rules/clash
          rm -rf rules/surge

#       - name: 生成 Mihomo 规则
#         run: |
#           ./geox geosite -f geosite.dat -t clash -o rules \
#             -s google,category-ntp,apple,category-porn,cn,geolocation-!cn,github,meta,category-ai-chat-!cn,github,telegram

      - name: 生成 Surge 规则
        run: |
          ./geox geosite -f geosite.dat -t surge -o rules -s "$GEOSITE_LIST"

          ./geox geoip -f geoip.dat -t surge -s "$GEOIP_LIST"

          # 合并 geosite & geoip
          for f in rules/surge/*.txt; do
              [ -f "$f" ] || continue
              name=$(basename "$f")

              if [ -f "geoip/surge/$name" ]; then
                  sort -u "$f" "geoip/surge/$name" -o "$f"
              fi
          done
      
      - name: 提交变更
        working-directory: rules
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout --orphan temp
          git branch -D rules
          git checkout --orphan rules
          
          git add .
          git commit -m "CI: Last Update at $(date +"%Y-%m-%d %H:%M")"
          git push -f origin rules

  clean_workflow:
    runs-on: ubuntu-latest
    needs: rule_sync
    steps:
      - name: clean_workflow
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 0
          repository: ${{ github.repository }}
