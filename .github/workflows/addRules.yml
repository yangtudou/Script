name: 自动化拉取规则
on:
  schedule:
    - cron: '0 12 * * *'  # 每天中午12点运行
  workflow_dispatch:       # 允许手动触发

permissions:
  contents: write

jobs:
  rule_sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rules:
          - name: 'a_dobe_dumb'
            url: 'https://raw.githubusercontent.com/ignaciocastro/a-dove-is-dumb/main/list.txt'
            format: 'list'
            processor: |
              # 直接生成处理后的文件
              sed -n -e '/# Last update:/p' -e '/^0\.0\.0\.0/s/0\.0\.0\.0 //p' "$TEMP_FILE" > "$PROCESSED_FILE"
              sed -i '1i\# 按照网上的修改过' "$PROCESSED_FILE"

          - name: 'AWAvenue_Ads_Rule'
            url: 'https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.yaml'
            format: 'yaml'
            processor: |
              sed "1i\# 原始仓库: https://github.com/TG-Twilight/AWAvenue-Ads-Rule" "$TEMP_FILE" > "$PROCESSED_FILE"

    steps:
      - name: 检查仓库
        uses: actions/checkout@v4
        with:
          repository: yangtudou/Script
          path: Script
          fetch-depth: 0

      - name: 处理规则文件
        env:
          TEMP_FILE: "temp_${{ matrix.rules.name }}"
          PROCESSED_FILE: "processed_${{ matrix.rules.name }}"
        run: |
          cd Script
          mkdir -p ruleProviders
          
          # 安全下载（带失败检测）
          curl -fsSL -o "$TEMP_FILE" "${{ matrix.rules.url }}"
          if [ ! -s "$TEMP_FILE" ]; then
            echo "❌ 文件下载失败：${{ matrix.rules.url }}"
            exit 1
          fi
          
          # 执行处理器命令
          ${{ matrix.rules.processor }}
          
          # 严格验证输出文件
          if [ ! -f "$PROCESSED_FILE" ]; then
            echo "❌ 处理失败：$PROCESSED_FILE 未生成"
            ls -la
            exit 1
          fi
          
          # 移动最终文件
          mv -f "$PROCESSED_FILE" "ruleProviders/${{ matrix.rules.name }}.${{ matrix.rules.format }}"
          
          # 强制清理残留
          rm -f "$TEMP_FILE" 2>/dev/null
          echo "✅ 临时文件已清理"

      - name: 提交变更
        run: |
          cd Script
          # 幂等写入.gitignore
          grep -q "temp_" .gitignore || echo "temp_*" >> .gitignore
          grep -q "processed_" .gitignore || echo "processed_*" >> .gitignore
          
          git add .gitignore ruleProviders
          
          if [[ -n $(git status -s) ]]; then
            git config user.email "action@github.com"
            git config user.name "GitHub Action"
            
            # 分支同步防冲突
            git pull --rebase origin main
            
            git commit -m "拉取新规则: ${{ matrix.rules.name }} $(date +'%Y-%m-%d %H:%M')"
            git push origin main
            echo "✅ 变更已提交"
          else
            echo "🟢 无变更可提交"
          fi

  cleanup:
    runs-on: ubuntu-latest
    needs: rule_sync
    steps:
      - name: 清理工作流
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          keep_minimum_runs: 5
