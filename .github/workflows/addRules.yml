name: 自动化规则管理

on:
  schedule:
    - cron: '0 12 * * *'  # 每天中午12点运行
  workflow_dispatch:       # 允许手动触发

permissions:
  actions: write
  contents: write

jobs:
  process_rules:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rule:
          - name: 'a_dobe_dumb'
            url: 'https://raw.githubusercontent.com/ignaciocastro/a-dove-is-dumb/main/list.txt'
            output: 'a_dobe_dumb.list'
            processor: |
              sed -n -e '/# Last update:/p' -e '/^0\.0\.0\.0/s/0\.0\.0\.0 //p' $TEMP_FILE > $PROCESSED_FILE
              sed -i '1i\# 按照网上的修改过' $PROCESSED_FILE
          
          - name: 'AWAvenue_Ads_Rule'
            url: 'https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.yaml'
            output: 'AWAvenue-Ads-Rule-Clash.yaml'
            processor: 'sed -i "1i\# 原始仓库: https://github.com/TG-Twilight/AWAvenue-Ads-Rule" $TEMP_FILE'

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          repository: yangtudou/Script
          path: Script

      - name: 处理规则文件
        env:
          TEMP_FILE: "temp_${{ matrix.rule.name }}"
          PROCESSED_FILE: "processed_${{ matrix.rule.name }}"
        run: |
          cd Script
          mkdir -p ruleProviders
          
          # 下载原始文件
          curl -sS -o "$TEMP_FILE" "${{ matrix.rule.url }}"
          
          # 执行处理命令
          ${{ matrix.rule.processor }}
          
          # 移动最终文件
          mv -f "$PROCESSED_FILE" "ruleProviders/${{ matrix.rule.output }}" || mv -f "$TEMP_FILE" "ruleProviders/${{ matrix.rule.output }}"
        shell: bash

      - name: 提交变更
        run: |
          cd Script
          if [[ -n $(git status -s) ]]; then
            git config user.email "action@github.com"
            git config user.name "GitHub Action"
            git add ruleProviders
            git commit -m "自动更新规则: $(date +'%Y-%m-%d %H:%M')"
            git push
          else
            echo "无变更可提交"
          fi
  cleanup:
    runs-on: ubuntu-latest
    needs: process_rules
    steps:
      - name: 清理工作流
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          keep_minimum_runs: 5
