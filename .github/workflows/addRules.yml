
name: 自动化拉取规则
on:
  schedule:
    - cron: '0 1 * * *'    # UTC 1:00 = 北京时间 9:00
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  rule_sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rules:
          - name: 'a_dobe_dumb'
            url: 'https://raw.githubusercontent.com/ignaciocastro/a-dove-is-dumb/main/list.txt'
            format: 'list'
            processor: |
              sed -n -e '/# Last update:/p' -e '/^0\.0\.0\.0/s/0\.0\.0\.0 //p' "$TEMP_FILE" > "$PROCESSED_FILE"
              sed -i '1i\# 最后拉取时间' "$PROCESSED_FILE"
          - name: 'AWAvenue_Ads_Rule_Clash'
            url: 'https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.yaml'
            format: 'yaml'
            processor: |
              sed "1i\# 原始仓库: https://github.com/TG-Twilight/AWAvenue-Ads-Rule" "$TEMP_FILE" > "$PROCESSED_FILE"
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          repository: yangtudou/Script
          ref: main
          path: rules_temp
          fetch-depth: 1

      - name: 处理规则文件
        env:
          TEMP_FILE: "temp_${{ matrix.rules.name }}"
          PROCESSED_FILE: "processed_${{ matrix.rules.name }}"
        run: |
          # 下载文件 保存为以 temp_ 为前缀的临时文件
          curl -fsSL -o "$TEMP_FILE" "${{ matrix.rules.url }}"

          # 执行处理器命令 并且更名为 processed_ 前缀的临时文件
          ${{ matrix.rules.processor }}

          # 移动最终文件 直接覆盖
          mv -f "$PROCESSED_FILE" "rules_temp/ruleProviders/${{ matrix.rules.name }}.${{ matrix.rules.format }}"

          echo $PWD
          bash -c ls

          cd rules_temp
          echo $PWD
          bash -c ls

          cd ruleProviders
          echo $PWD
          bash -c ls

  cleanup:
    runs-on: ubuntu-latest
    needs: rule_sync
    steps:
      - name: 清理工作流
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          keep_minimum_runs: 2
