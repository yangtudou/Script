name: 自动化拉取规则
on:
  schedule:
    - cron: '0 1 * * *'    # UTC 1:00 = 北京时间 9:00
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  rule_sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rules:
          - name: 'a_dobe_dumb'
            url: 'https://raw.githubusercontent.com/ignaciocastro/a-dove-is-dumb/main/list.txt'
            format: 'list'
            processor: |
              sed -n -e '/# Last update:/p' -e '/^0\.0\.0\.0/s/0\.0\.0\.0 //p' "$TEMP_FILE" > "$PROCESSED_FILE"
              sed -i '1i\# 最后拉取时间' "$PROCESSED_FILE"

          - name: 'AWAvenue_Ads_Rule_Clash'
            url: 'https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.yaml'
            format: 'yaml'
            processor: |
              sed "1i\# 原始仓库: https://github.com/TG-Twilight/AWAvenue-Ads-Rule" "$TEMP_FILE" > "$PROCESSED_FILE"

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          repository: yangtudou/Script
          ref: main
          path: Script
          fetch-depth: 1

      - name: 处理规则文件
        env:
          # 使用绝对路径避免目录混乱
          TEMP_DIR: "$GITHUB_WORKSPACE/Script/.temp"
          TEMP_FILE: "$GITHUB_WORKSPACE/Script/.temp/temp_${{ matrix.rules.name }}"
          PROCESSED_FILE: "$GITHUB_WORKSPACE/Script/.temp/processed_${{ matrix.rules.name }}"
        run: |
          cd Script
          mkdir -p ruleProviders
          
          # 确保临时目录存在（重要修复点）
          mkdir -p "$TEMP_DIR"

          # 安全下载（带失败检测）
          echo "▶️ 下载规则: ${{ matrix.rules.name}}"
          curl -fsSL -o "$TEMP_FILE" "${{ matrix.rules.url }}"
          
          # 增强错误检测
          if [ ! -s "$TEMP_FILE" ]; then
            echo "❌ 文件下载失败：${{ matrix.rules.name}}"
            ls -la "$(dirname "$TEMP_FILE")"
            exit 1
          fi
          
          # 执行处理器命令（显式使用bash）
          echo "🔄 处理规则文件..."
          bash -c "${{ matrix.rules.processor }}"
          
          # 严格验证输出文件
          if [ ! -f "$PROCESSED_FILE" ]; then
            echo "❌ 处理失败：$PROCESSED_FILE 未生成"
            echo "临时目录内容:"
            ls -la "$TEMP_DIR"
            exit 1
          fi
          
          # 移动最终文件
          mv -f "$PROCESSED_FILE" "ruleProviders/${{ matrix.rules.name }}.${{ matrix.rules.format }}"
          echo "✅ ${{ matrix.rules.name}} 处理完成"
          
          # 清理临时文件（保留目录）
          rm -f "$TEMP_FILE"

      - name: 提交变更
        run: |
          cd Script
          git add ruleProviders
          
          if [[ -n $(git status --porcelain ruleProviders) ]]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git commit -m "拉取新规则: ${{ join(matrix.rules.*) }} $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
            git push
            echo "➕ 变更已提交"
          else
            echo "🟢 无变更可提交"
          fi

  cleanup:
    runs-on: ubuntu-latest
    needs: rule_sync
    steps:
      - name: 清理工作流
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          keep_minimum_runs: 2
