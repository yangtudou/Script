name: 自动化规则管理

on:
  schedule:
    - cron: '0 12 * * *'  # 每天中午12点运行
  workflow_dispatch:       # 允许手动触发

permissions:
  actions: write
  contents: write

jobs:
  process_rules:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rule:
          - name: 'a_dobe_dumb'
            url: 'https://raw.githubusercontent.com/ignaciocastro/a-dove-is-dumb/main/list.txt'
            output: 'a_dobe_dumb.list'
            processor: |
              sed -n -e '/# Last update:/p' -e '/^0\.0\.0\.0/s/0\.0\.0\.0 //p' "$TEMP_FILE" > "$PROCESSED_FILE"
              sed -i '1i\# 按照网上的修改过' "$PROCESSED_FILE"
          
          - name: 'AWAvenue_Ads_Rule'
            url: 'https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.yaml'
            output: 'AWAvenue-Ads-Rule-Clash.yaml'
            processor: |
              cp "$TEMP_FILE" "$PROCESSED_FILE"
              sed -i "1i\# 原始仓库: https://github.com/TG-Twilight/AWAvenue-Ads-Rule" "$PROCESSED_FILE"

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          repository: yangtudou/Script
          path: Script
          fetch-depth: 0  # 获取完整提交历史[5](@ref)

      - name: 处理规则文件
        env:
          TEMP_FILE: "temp_${{ matrix.rule.name }}"
          PROCESSED_FILE: "processed_${{ matrix.rule.name }}"
        run: |
          cd Script
          mkdir -p ruleProviders
          
          # 下载文件（支持重定向）
          curl -sS -L -o "$TEMP_FILE" "${{ matrix.rule.url }}"
          
          # 验证下载
          if [ ! -s "$TEMP_FILE" ]; then
            echo "❌ 文件下载失败或为空"
            exit 1
          fi
          
          # 执行处理命令
          ${{ matrix.rule.processor }}
          
          # 验证处理结果
          if [ ! -f "$PROCESSED_FILE" ]; then
            echo "❌ 处理后文件未生成: $PROCESSED_FILE"
            exit 1
          fi
          
          # 移动最终文件
          mv -f "$PROCESSED_FILE" "ruleProviders/${{ matrix.rule.output }}"
          
          # 关键修复：清理临时文件[6,7](@ref)
          rm -f "$TEMP_FILE" "$PROCESSED_FILE"
          echo "✅ 临时文件已清理"
        shell: bash

      - name: 提交变更
        run: |
          cd Script
          # 添加.gitignore防止临时文件被跟踪[7](@ref)
          if [ ! -f .gitignore ]; then
            echo "temp_*" >> .gitignore
            echo "processed_*" >> .gitignore
          fi
          
          git add .gitignore ruleProviders
          
          if [[ -n $(git status -s) ]]; then
            git config user.email "action@github.com"
            git config user.name "GitHub Action"
            git commit -m "自动更新规则: ${{ matrix.rule.name }} $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "✅ 变更已提交"
          else
            echo "🟢 无变更可提交"
          fi

  cleanup:
    runs-on: ubuntu-latest
    needs: process_rules
    steps:
      - name: 清理工作流
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          keep_minimum_runs: 5
