name: 自动化拉取规则管理

on:
  schedule:
    - cron: '0 12 * * *'  # 每天中午12点运行
  workflow_dispatch:       # 允许手动触发

permissions:
  actions: write
  contents: write

jobs:
  process_rules:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rule:
          - name: 'a_dobe_dumb'
            url: 'https://raw.githubusercontent.com/ignaciocastro/a-dove-is-dumb/main/list.txt'
            output: 'a_dobe_dumb.list'
            processor: 'sed -n -e "/# Last update:/p" -e "/^0\.0\.0\.0/s/0\.0\.0\.0 //p" $FILE > $OUTPUT; sed -i "1i\# 按照网上的修改过" $OUTPUT'
          
          - name: 'AWAvenue_Ads_Rule'
            url: 'https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.yaml'
            output: 'AWAvenue-Ads-Rule-Clash.yaml'
            processor: 'sed -i "1i\# 原始仓库: https://github.com/TG-Twilight/AWAvenue-Ads-Rule" $FILE'

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          repository: yangtudou/Script
          path: Script

      - name: 处理规则文件
        run: |
          cd Script
          mkdir -p ruleProviders
          
          FILE="${RANDOM}_temp"
          OUTPUT="${RANDOM}_processed"
          
          # 下载并处理文件
          curl -sS -o "$FILE" "${{ matrix.rule.url }}"
          eval "${matrix.rule.processor//\$FILE/$FILE}"  # 动态执行处理命令
          mv -f "$FILE" "ruleProviders/${{ matrix.rule.output }}"
        shell: bash

      - name: 提交变更
        if: always()  # 确保清理步骤始终执行
        run: |
          cd Script
          if [[ -n $(git status -s) ]]; then
            git config user.email "action@github.com"
            git config user.name "GitHub Action"
            git add ruleProviders
            git commit -m "自动拉取更新规则: $(date +'%Y-%m-%d %H:%M')"
            git push
          else
            echo "无变更可提交"
          fi

  cleanup:
    runs-on: ubuntu-latest
    needs: process_rules
    steps:
      - name: 清理工作流
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          keep_minimum_runs: 5
