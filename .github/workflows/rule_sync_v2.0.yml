# version: v2.1_beta
# updated at: 2026-03-07
# 改用 checkout sparse-checkout
# 改用 rules 分支管理
# 所有 IP-CIDR/IP-CIDR6 規則自動追加 ,no-resolve（防重複）

#
# UTC 22:00 (北京时间早 6:00 自动拉取) 
#
# 支持 Surge ClashMeta、Clash Premium
#

name: 自动化规则下载 v2.1_beta

on:
  # schedule:
  #   - cron: '0 22 * * *'
  workflow_dispatch:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - ".github/custom_direct.txt"
  #     - ".github/custom_proxy.txt"

permissions:
  contents: write
  actions: write

env:
  TZ: Asia/shanghai

jobs:
  rule_sync:
    runs-on: ubuntu-latest
    steps:
   
      - name: "当前仓库 rules 分支"
        uses: actions/checkout@v6
        with:
          path: rule_sync_temp
          ref: rules
          fetch-depth: 1

      - name: "MetaCubeX 仓库 meta 分支"
        uses: actions/checkout@v6
        with:
          repository: MetaCubeX/meta-rules-dat
          ref: meta
          fetch-depth: 1
          path: meta-rules-dat
          sparse-checkout: |
            geo/geosite/category-ntp.list
            geo/geosite/private.list
            geo/geoip/private.list
            geo/geosite/category-ai-chat-!cn.list
            geo/geosite/google.list
            geo/geosite/telegram.list
            geo/geoip/telegram.list
            geo/geosite/meta.list
            geo/geosite/category-porn.list
            geo/geosite/geolocation-!cn.list
            geo/geosite/cn.list
            

          sparse-checkout-cone-mode: false
          
      - name: 整理 Surge 规则
        run: |
          
          # 下载主分支下的 python 脚本
          curl -sSL https://raw.githubusercontent.com/yangtudou/Script/main/surge/RuleRefiner.py -o RuleRefiner.py

          # 开始
          python3 RuleRefiner.py \
            -s "meta-rules-dat/geo/geosite" \
            -i "meta-rules-dat/geo/geoip" \
            -o "rule_sync_temp/Surge"
      
      - name: 提交变更
        working-directory: rule_sync_temp
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout --orphan temp
          git branch -D rules
          git checkout --orphan rules
          
          git add .
          git commit -m "CI: Last Update at $(date +"%Y-%m-%d %H:%M") + no-resolve for IP rules"
          git push -f origin rules

  clean_workflow:
    runs-on: ubuntu-latest
    needs: rule_sync
    steps:
      - name: clean_workflow
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 0
          repository: ${{ github.repository }}
